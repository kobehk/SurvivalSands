<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SurvivalSands</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; background: #1a1a1a; color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  /* 100dvh 适配手机浏览器的动态底栏；100vh 作为旧浏览器 fallback */
  #app { display: grid; grid-template-columns: 1fr 380px; height: 100vh; height: 100dvh;
    overflow: hidden; }
  #left { display: flex; flex-direction: column; border-right: 1px solid #333; min-height: 0; min-width: 0; }
  #map-wrap { flex: 1 1 0; min-height: 0; position: relative; overflow: hidden; background: #0a0a18; }
  #map { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
  #hud { flex: 0 0 auto; padding: 8px 12px; font-size: 13px; background: #222; border-top: 1px solid #333;
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  #hud .k { color: #888; margin-right: 4px; }
  #right { display: flex; flex-direction: column; min-height: 0; }
  #scene { flex: 0 0 auto; max-height: 30vh; overflow-y: auto;
    padding: 12px 14px; border-bottom: 1px solid #333; background: #1f1f24; }
  #scene h2 { margin: 0 0 6px 0; font-size: 16px; color: #f0c97c; }
  #scene .desc { font-size: 13px; color: #bbb; line-height: 1.5; }
  #inv { flex: 0 0 auto; padding: 8px 14px; font-size: 12px; color: #aaa;
    border-bottom: 1px solid #333; background: #1a1a1a; max-height: 80px; overflow-y: auto; }
  #inv .item { display: inline-block; margin: 2px 8px 2px 0; padding: 2px 6px;
    background: #2c2c34; border-radius: 3px; }
  #log { flex: 1 1 0; min-height: 0; overflow-y: auto;
    padding: 12px 14px; font-size: 14px; line-height: 1.55; }
  #log .entry { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed #2a2a2a; }
  #log .entry:last-child { border-bottom: none; }
  #log .you { color: #84a8ff; }
  #log .narration { color: #ddd; white-space: pre-wrap; }
  #log .meta { color: #666; font-size: 11px; margin-top: 4px; }
  #log .err { color: #ff6b6b; }
  #log .system { color: #888; font-style: italic; }
  #input-wrap { flex: 0 0 auto; padding: 12px; border-top: 1px solid #333; background: #1f1f24; }
  #input { width: 100%; padding: 10px; font-size: 14px; background: #2a2a2a; border: 1px solid #444;
    color: #eee; border-radius: 4px; font-family: inherit; }
  #input:focus { outline: none; border-color: #f0c97c; }
  #hint { font-size: 12px; color: #777; margin-top: 6px; }
  button { background: #2a2a2a; color: #ddd; border: 1px solid #444; padding: 4px 10px;
    border-radius: 3px; cursor: pointer; font-size: 12px; }
  button:hover { background: #3a3a3a; }
  .stat-bar { display: inline-flex; align-items: center; gap: 6px; }
  .bar { width: 60px; height: 8px; background: #333; border-radius: 2px; overflow: hidden; }
  .bar > div { height: 100%; transition: width 0.3s; }
  .hp > div { background: #c33; }
  .hunger > div { background: #c93; }
  .thirst > div { background: #39c; }
  .fatigue > div { background: #999; }

  /* === 背包面板 === */
  #inv-toggle { cursor: pointer; user-select: none; }
  #inv-toggle:hover { color: #f0c97c; }
  #pack-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.65);
    display: none; z-index: 100; align-items: center; justify-content: center; }
  #pack-overlay.open { display: flex; }
  #pack {
    width: min(760px, 92vw); max-height: 80vh; overflow-y: auto;
    background: #1f1f24; border: 1px solid #444; border-radius: 8px;
    padding: 18px 22px; font-size: 14px; line-height: 1.6;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #pack h2 { margin: 0 0 14px 0; color: #f0c97c; font-size: 18px;
    display: flex; justify-content: space-between; align-items: center; }
  #pack .pack-close { font-size: 13px; color: #aaa; cursor: pointer; }
  #pack .pack-close:hover { color: #fff; }
  #pack .pack-empty { color: #888; font-style: italic; padding: 30px; text-align: center; }
  #pack .pack-cat { margin-bottom: 18px; }
  #pack .pack-cat h3 { margin: 0 0 6px 0; font-size: 13px; color: #888; font-weight: normal;
    text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 4px; }
  #pack .pack-item { display: grid; grid-template-columns: 1fr auto; gap: 12px;
    padding: 6px 4px; border-bottom: 1px dashed #2a2a2a; }
  #pack .pack-item:last-child { border-bottom: none; }
  #pack .pack-item .name { color: #ddd; font-weight: 500; }
  #pack .pack-item .qty { color: #f0c97c; font-variant-numeric: tabular-nums; }
  #pack .pack-item .notes { color: #888; font-size: 12px; grid-column: 1 / -1;
    margin-top: 2px; }
  #pack .pack-item .id-tag { color: #555; font-size: 11px; font-family: monospace; }

  /* 中等宽度：右栏窄一点 */
  @media (max-width: 1100px) {
    #app { grid-template-columns: 1fr 320px; }
  }
  /* 窄屏（手机/平板竖屏）：上下双栏 */
  @media (max-width: 720px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    #left { border-right: none; border-bottom: 1px solid #333; }
    #scene { max-height: 25vh; }
    #inv { max-height: 60px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="left">
    <div id="map-wrap">
      <canvas id="map"></canvas>
    </div>
    <div id="hud"></div>
  </div>
  <div id="right">
    <div id="scene">
      <h2 id="scene-title">…</h2>
      <div class="desc" id="scene-desc">载入中…</div>
    </div>
    <div id="inv"></div>
    <div id="log"></div>
    <div id="input-wrap">
      <input id="input" placeholder="描述你的动作（回车提交），WASD 走动" autocomplete="off">
      <div id="hint">
        例：捡几个椰子 · 用石头砸开椰子 · 在这里搭个简易棚子 · /reset 重置 · 按住 Shift 跑步 · ESC 中止当前动作 · I 看背包
        <button id="btn-abort" style="display:none;margin-left:8px;color:#ff8a8a">中止</button>
      </div>
    </div>
  </div>
</div>

<div id="pack-overlay">
  <div id="pack">
    <h2>
      <span>背包 <span id="pack-summary" style="color:#888;font-size:13px;font-weight:normal;"></span></span>
      <span class="pack-close" id="pack-close">关闭 (ESC / I)</span>
    </h2>
    <div id="pack-body"></div>
  </div>
</div>
<!-- 自动生成的物品映射表，请勿手动修改 -->
<script src="item_map.js"></script>
<script src="game.js" type="module"></script>
</body>
</html>
